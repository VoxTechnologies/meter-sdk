name: SDK version PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - uses: changesets/action@v1
        with:
          version: npm run version:packages
          title: "chore: version Meter SDK packages"
          commit: "chore: version Meter SDK packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
