name: SDK publish

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: meter-sdk-publish
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Require public source for npm provenance
        env:
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          if [ "$REPOSITORY_PRIVATE" != "false" ]; then
            echo "The Meter SDK source repository must be public before publishing with npm provenance." >&2
            exit 1
          fi

  publish:
    needs: preflight
    # npm provenance rejects self-hosted/third-party runners (Blacksmith), so the
    # publishing job must run on a GitHub-hosted runner.
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.11.0
      - run: npm ci
      - name: Verify tag and manifests
        run: node scripts/verify-sdk-release.mjs
      - name: Verify source, tests, and packed consumers
        run: npm run verify
      # Publish every package in the fixed-version group, skipping any version
      # already on the registry so a re-run after a partial failure is safe.
      - name: Publish SDK
        run: |
          v=$(node -p "require('./packages/sdk/package.json').version")
          npm view "@meter-mcp/sdk@$v" version >/dev/null 2>&1 \
            && echo "@meter-mcp/sdk@$v already published; skipping" \
            || npm publish --workspace @meter-mcp/sdk
      - name: Publish MCP wrapper
        run: |
          v=$(node -p "require('./packages/mcp/package.json').version")
          npm view "@meter-mcp/mcp@$v" version >/dev/null 2>&1 \
            && echo "@meter-mcp/mcp@$v already published; skipping" \
            || npm publish --workspace @meter-mcp/mcp
      - name: Publish framework adapters
        run: |
          v=$(node -p "require('./packages/adapters/package.json').version")
          npm view "@meter-mcp/adapters@$v" version >/dev/null 2>&1 \
            && echo "@meter-mcp/adapters@$v already published; skipping" \
            || npm publish --workspace @meter-mcp/adapters
      - name: Publish CLI
        run: |
          v=$(node -p "require('./packages/cli/package.json').version")
          npm view "@meter-mcp/cli@$v" version >/dev/null 2>&1 \
            && echo "@meter-mcp/cli@$v already published; skipping" \
            || npm publish --workspace @meter-mcp/cli
